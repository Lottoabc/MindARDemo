# GitHub Actions — 自动部署到 GitHub Pages
# ============================================================================
# 每当推送到 main 分支时自动构建并部署到 gh-pages 分支
#
# 使用前需要配置：
#   1. GitHub 仓库 Settings → Pages → Source: GitHub Actions
#   2. GitHub 仓库 Settings → Secrets and variables → Actions → 添加：
#      - VITE_API_BASE: 你的后端地址 (如 https://xxx.onrender.com)
#      - VITE_SOCKET_URL: 你的 Socket.IO 地址 (同后端地址)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 允许手动触发部署
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 确保同一时间只有一个部署任务
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: 安装依赖
        working-directory: client
        run: npm ci

      - name: 构建
        working-directory: client
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'https://your-backend.onrender.com' }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL || 'https://your-backend.onrender.com' }}

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
